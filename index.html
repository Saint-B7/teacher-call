<!DOCTYPE html>
<!--
  [교무실 밖 태블릿용] index.html — 키오스크 스타일
  • GitHub Pages에 올려 학생 태블릿 브라우저 홈화면에 등록해두면 됩니다.
  • URL에 ?code=... 가 있으면 자동 연결, 없으면 코드 입력 화면을 표시합니다.
  • 호출 전송 후 자동 초기화되어 다음 학생이 바로 사용할 수 있습니다.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>교무실 호출</title>

<!-- PWA: 홈화면에 추가하면 전체화면 앱으로 실행됩니다 -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="교무실 호출">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c0623f">

<!-- PeerJS: jsdelivr(1순위) → unpkg(2순위) 폴백 -->
<script>
(function(){
  function loadScript(url,ok,fail){var s=document.createElement('script');s.src=url;s.onload=ok;s.onerror=fail;document.head.appendChild(s);}
  loadScript('https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
    function(){console.log('[PeerJS] OK');},
    function(){
      loadScript('https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js',
        function(){console.log('[PeerJS] unpkg OK');},
        function(){
          document.body.innerHTML='<div style="padding:48px;text-align:center;font-family:sans-serif;color:#c0623f">'
            +'<h2>⚠️ PeerJS를 불러올 수 없습니다</h2><p>인터넷 연결 또는 CDN 차단 여부를 확인하세요.</p></div>';
        });
    });
})();
</script>

<!-- Pretendard 폰트: 한국어 디지털 UI 최적화 산세리프 (오픈소스) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
  /* ────── 색상 토큰 ────── */
  :root{
    --bg:#f5f2eb; --card:#fff; --ink:#28251f; --muted:#9a9288;
    --line:#e4ddd0; --accent:#c0623f; --accent-soft:#fdf0eb; --ok:#4e7a55;
    --r-lg:24px; --r-md:16px; --r-sm:12px;
  }
  [data-dark]{
    --bg:#1b1916; --card:#252220; --ink:#ede8df; --muted:#8a847a;
    --line:#3a342c; --accent:#d98060; --accent-soft:#2e1e14; --ok:#80ae86;
  }

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100dvh;}
  body{
    background:var(--bg);color:var(--ink);
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
    font-weight:500;
    letter-spacing:-0.01em;
    display:flex;flex-direction:column;align-items:center;
    padding:32px 24px 60px;
    transition:background .3s,color .3s;
  }

  /* ────── 헤더 ────── */
  header{
    width:100%;max-width:1100px;
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:28px;
  }
  h1{
    font-size:1.8rem;font-weight:800;margin:0;line-height:1.2;
    letter-spacing:-0.03em;
  }
  h1 small{
    display:block;font-size:.92rem;font-weight:500;
    color:var(--muted);margin-top:4px;letter-spacing:-0.01em;
  }
  .theme-btn{
    border:1.5px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:999px;padding:10px 16px;cursor:pointer;
    font-family:inherit;font-size:.88rem;font-weight:600;flex-shrink:0;
    transition:.15s;
  }
  .theme-btn:active{transform:scale(.95);}

  /* ────── 카드 ────── */
  .card{
    width:100%;max-width:1100px;
    background:var(--card);border:1px solid var(--line);
    border-radius:var(--r-lg);padding:28px;margin-bottom:14px;
  }

  /* ────── 연결 전 코드 입력 카드: 좁게 ────── */
  #cardConnect{ max-width:640px; }

  /* ────── 연결 후 STEP2+STEP3 나란히 배치 ────── */
  #mainArea{
    width:100%;max-width:1100px;
    display:grid;
    grid-template-columns:1fr 1fr;   /* 선생님 명단 | 호출 목적 */
    gap:16px;
    align-items:start;               /* 높이가 다를 때 상단 정렬 */
  }
  /* 태블릿 세로 모드에서는 1열로 */
  @media(max-width:700px){
    #mainArea{ grid-template-columns:1fr; }
  }
  /* mainArea 안의 카드는 margin 제거 (gap이 대신) */
  #mainArea .card{ margin-bottom:0; max-width:none; }

  /* ────── 선생님 선택 전 STEP3 비활성 상태 ────── */
  #cardCall[data-inactive]{
    opacity:.42;
    pointer-events:none;
    user-select:none;
  }
  #cardCall[data-inactive] .step-label::after{
    content:' — 선생님을 먼저 선택하세요';
    font-size:.75rem;font-weight:500;letter-spacing:0;opacity:.8;
  }

  /* ────── STEP 라벨 ────── */
  .step-label{
    display:inline-block;
    font-size:.82rem;color:var(--accent);font-weight:700;
    margin-bottom:14px;letter-spacing:.06em;text-transform:uppercase;
    padding:4px 12px;background:var(--accent-soft);border-radius:999px;
  }

  /* ────── STEP 1: 코드 입력 (작은 영역) ────── */
  .row{display:flex;gap:10px;}
  input[type=text]{
    flex:1;padding:18px 18px;border:1.5px solid var(--line);
    border-radius:var(--r-sm);
    background:var(--bg);color:var(--ink);
    font-family:inherit;font-weight:600;
    font-size:1.15rem;letter-spacing:.04em;
  }
  input[type=text]:focus{outline:none;border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);}
  .btn-connect{
    padding:18px 28px;background:var(--accent);color:#fff;
    border:none;border-radius:var(--r-sm);
    font-family:inherit;font-size:1.05rem;font-weight:700;
    cursor:pointer;letter-spacing:-0.01em;
    white-space:nowrap;transition:.15s;
  }
  .btn-connect:active{transform:scale(.96);}
  .btn-connect:disabled{opacity:.4;cursor:not-allowed;}

  /* ────── 연결 상태 ────── */
  .status{display:flex;align-items:center;gap:10px;font-size:.95rem;
    color:var(--muted);margin-top:14px;font-weight:500;}
  .dot{width:10px;height:10px;border-radius:50%;background:var(--muted);
    flex-shrink:0;transition:.3s;}
  .dot.on{background:var(--ok);
    box-shadow:0 0 0 5px color-mix(in srgb,var(--ok) 22%,transparent);}

  /* ════════════════════════════════════════════════════
     ★ STEP 2: 선생님 명단 - 키오스크 사이즈 (크게)
  ════════════════════════════════════════════════════ */
  #cardTeacher .step-label{margin-bottom:18px;}
  .teacher-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:14px;
  }
  .teacher-btn{
    padding:24px 20px;
    border:2px solid var(--line);background:var(--card);
    border-radius:var(--r-md);cursor:pointer;
    font-family:inherit;
    font-size:1.55rem;        /* 키오스크 핵심: 큰 글자 */
    font-weight:700;
    color:var(--ink);letter-spacing:-0.02em;
    transition:.15s;
    min-height:84px;
    display:flex;align-items:center;justify-content:center;
  }
  .teacher-btn:hover{border-color:var(--accent);color:var(--accent);
    background:var(--accent-soft);}
  .teacher-btn.selected{
    border-color:var(--accent);background:var(--accent);color:#fff;
    box-shadow:0 6px 24px color-mix(in srgb,var(--accent) 35%,transparent);
  }
  .teacher-btn:active{transform:scale(.97);}

  /* ════════════════════════════════════════════════════
     ★ STEP 3: 호출 목적 - 키오스크 사이즈 (크게)
  ════════════════════════════════════════════════════ */
  .call-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:14px;
  }
  .call-btn{
    position:relative;overflow:hidden;
    height:148px;                /* 키오스크 핵심: 큰 버튼 */
    border:2px solid var(--line);background:var(--card);
    border-radius:var(--r-md);cursor:pointer;
    font-family:inherit;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;transition:.15s;
  }
  .call-btn .icon{font-size:2.6rem;line-height:1;}    /* 큰 아이콘 */
  .call-btn .lbl{font-size:1.3rem;font-weight:700;    /* 큰 라벨 */
    letter-spacing:-0.02em;}
  .call-btn:not(:disabled):hover{
    border-color:var(--accent);background:var(--accent-soft);color:var(--accent);
  }
  .call-btn:not(:disabled):active{transform:scale(.97);}
  .call-btn:disabled{opacity:.3;cursor:not-allowed;}

  /* 잔물결 효과 */
  .ripple{position:absolute;border-radius:50%;background:var(--accent);
    opacity:.18;transform:scale(0);animation:rpl .55s linear;pointer-events:none;}
  @keyframes rpl{to{transform:scale(4);opacity:0;}}

  /* ────── 전송 완료 메시지 ────── */
  .sent-msg{
    margin-top:18px;padding:20px;text-align:center;
    background:color-mix(in srgb,var(--ok) 12%,transparent);
    border:1.5px solid color-mix(in srgb,var(--ok) 32%,transparent);
    border-radius:var(--r-md);color:var(--ok);
    font-weight:700;font-size:1.15rem;letter-spacing:-0.01em;
    opacity:0;transition:.3s;
  }
  .sent-msg.show{opacity:1;}

  /* ────── 초기화 버튼 ────── */
  .btn-reset{
    width:100%;margin-top:12px;padding:16px;
    background:var(--bg);color:var(--muted);
    border:1.5px solid var(--line);border-radius:var(--r-md);
    font-family:inherit;font-size:1rem;font-weight:600;
    cursor:pointer;transition:.15s;
  }
  .btn-reset:hover{border-color:var(--accent);color:var(--accent);}
  .btn-reset:active{transform:scale(.98);}

  /* ────── 토스트 ────── */
  .toast{
    position:fixed;bottom:28px;left:50%;
    transform:translateX(-50%) translateY(14px);
    background:var(--ink);color:var(--bg);
    padding:14px 26px;border-radius:999px;
    font-size:.95rem;font-weight:600;opacity:0;transition:.25s;
    pointer-events:none;white-space:nowrap;
    box-shadow:0 12px 32px rgba(0,0,0,.18);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hint{font-size:.92rem;color:var(--muted);line-height:1.7;
    margin:12px 0 0;font-weight:500;}
  .hidden{display:none!important;}

  /* ────── 카드 등장 애니메이션 ────── */
  .card, #mainArea{animation:cardIn .4s cubic-bezier(.16,1,.3,1) backwards;}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

  /* 태블릿 세로 모드 최적화 */
  @media(min-width:601px){
    body{padding-top:48px;}
    .card{padding:32px;}
  }
</style>
</head>
<body>

<header>
  <h1>교무실 호출<small>시험 기간 교무실 선생님 호출</small></h1>
  <button class="theme-btn" id="themeBtn">🌙 다크</button>
</header>

<!-- STEP 1: 코드 입력 -->
<div class="card" id="cardConnect">
  <span class="step-label">STEP 1 · 호출 코드 입력</span>
  <div class="row">
    <input type="text" id="codeInput" placeholder="예: room-3a7f"
      autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="btn-connect" id="connectBtn">연결</button>
  </div>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">호출 코드를 입력하고 연결하세요.</span>
  </div>
  <p class="hint">
    교무실 안 태블릿(수신 화면)에 크게 표시된 코드를 입력하거나,<br>
    QR 코드가 있다면 카메라로 스캔하면 자동 연결됩니다.
  </p>
</div>

<!-- 연결 후: STEP2 + STEP3 나란히 (처음에는 hidden) -->
<div id="mainArea" class="hidden">

  <!-- STEP 2: 선생님 명단 -->
  <div class="card" id="cardTeacher">
    <span class="step-label">STEP 2 · 선생님 선택</span>
    <div class="teacher-grid" id="teacherGrid"></div>
  </div>

  <!-- STEP 3: 호출 목적 (선생님 선택 전 비활성, 선택 후 활성) -->
  <div class="card" id="cardCall" data-inactive>
    <span class="step-label">STEP 3 · 호출 목적 선택</span>
    <div class="call-grid">
      <button class="call-btn" data-item="상담"    disabled><span class="icon">💬</span><span class="lbl">상담</span></button>
      <button class="call-btn" data-item="서류 제출" disabled><span class="icon">📄</span><span class="lbl">서류 제출</span></button>
      <button class="call-btn" data-item="출석 확인" disabled><span class="icon">✅</span><span class="lbl">출석 확인</span></button>
      <button class="call-btn" data-item="질문"    disabled><span class="icon">❓</span><span class="lbl">질문</span></button>
      <button class="call-btn" data-item="서명"    disabled><span class="icon">✍️</span><span class="lbl">서명</span></button>
      <button class="call-btn" data-item="기타"    disabled><span class="icon">📢</span><span class="lbl">기타</span></button>
    </div>
    <div class="sent-msg" id="sentMsg"></div>
    <button class="btn-reset hidden" id="resetBtn">↩ 처음으로 돌아가기 (다음 학생)</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   다크모드
═══════════════════════════════════════════ */
document.getElementById('themeBtn').addEventListener('click', () => {
  document.body.toggleAttribute('data-dark');
  document.getElementById('themeBtn').textContent =
    document.body.hasAttribute('data-dark') ? '☀️ 라이트' : '🌙 다크';
});

/* ═══════════════════════════════════════════
   토스트
═══════════════════════════════════════════ */
const toastEl = document.getElementById('toast');
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2400);
}

/* ═══════════════════════════════════════════
   상태 변수
═══════════════════════════════════════════ */
let conn            = null;   // 교무실과의 PeerJS 연결
let selectedTeacher = null;   // 선택된 선생님 이름
let sentTimer       = null;   // 자동 초기화 타이머

const dot        = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const connectBtn = document.getElementById('connectBtn');
const codeInput  = document.getElementById('codeInput');

/* ═══════════════════════════════════════════
   PeerJS 연결
═══════════════════════════════════════════ */
function startConnect(code) {
  if (typeof Peer === 'undefined') {
    statusText.textContent = 'PeerJS 로딩 중... 잠시 후 다시 눌러주세요.';
    connectBtn.disabled = false;
    return;
  }
  connectBtn.disabled = true;
  statusText.textContent = '연결 중...';

  const myPeer = new Peer();
  myPeer.on('open', () => {
    conn = myPeer.connect(code, { reliable: true });

    // ★ data 리스너를 open 이전에 먼저 등록해야
    //   연결 직후 도착하는 init 메시지를 놓치지 않습니다.
    conn.on('data', (raw) => {
      try {
        const msg = JSON.parse(raw);
        if (msg.type === 'init') buildTeacherButtons(msg.teachers);
      } catch(e) {}
    });

    conn.on('open', () => {
      dot.classList.add('on');
      statusText.textContent = '교무실 연결됨 ✓ 선생님 목록을 불러오는 중...';
      // 연결 완료를 receive에게 알려서 선생님 목록 전송을 요청
      conn.send(JSON.stringify({ type: 'ready' }));
    });

    conn.on('error', () => {
      statusText.textContent = '연결 오류 — 코드를 확인하세요.';
      connectBtn.disabled = false;
    });

    conn.on('close', () => {
      dot.classList.remove('on');
      showToast('연결이 끊겼습니다. 페이지를 새로고침하세요.');
      document.querySelectorAll('.call-btn').forEach(b => b.disabled = true);
    });
  });

  myPeer.on('error', () => {
    statusText.textContent = '오류 — 코드가 맞는지, 교무실 화면이 켜져 있는지 확인하세요.';
    connectBtn.disabled = false;
  });
}

connectBtn.addEventListener('click', () => {
  const code = codeInput.value.trim();
  if (!code) { showToast('호출 코드를 먼저 입력하세요'); return; }
  startConnect(code);
});
codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') connectBtn.click(); });

/* ═══════════════════════════════════════════
   선생님 목록 버튼 생성 (키오스크 사이즈)
═══════════════════════════════════════════ */
function buildTeacherButtons(teachers) {
  const grid = document.getElementById('teacherGrid');
  grid.innerHTML = '';
  teachers.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'teacher-btn';
    btn.textContent = name + ' 선생님';
    btn.addEventListener('click', () => {
      document.querySelectorAll('.teacher-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTeacher = name;
      // STEP3 활성화: data-inactive 제거 + 버튼 활성화
      document.getElementById('cardCall').removeAttribute('data-inactive');
      document.querySelectorAll('.call-btn').forEach(b => b.disabled = false);
    });
    grid.appendChild(btn);
  });

  // STEP 1 숨기기 + STEP 2·3 한 화면에 표시
  document.getElementById('cardConnect').classList.add('hidden');
  document.getElementById('mainArea').classList.remove('hidden');
  statusText.textContent = '연결됨 ✓';
}

/* ═══════════════════════════════════════════
   호출 전송 + 자동 초기화
═══════════════════════════════════════════ */
const sentMsg  = document.getElementById('sentMsg');
const resetBtn = document.getElementById('resetBtn');

document.querySelectorAll('.call-btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    if (!selectedTeacher) { showToast('선생님을 먼저 선택해 주세요.'); return; }
    if (!conn || !conn.open) { showToast('연결이 끊겼습니다. 새로고침 후 다시 연결하세요.'); return; }

    // 잔물결 효과
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);

    // 교무실로 전송
    conn.send(JSON.stringify({ type: 'call', teacher: selectedTeacher, item: btn.dataset.item }));

    sentMsg.textContent = `${selectedTeacher} 선생님께 '${btn.dataset.item}' 호출을 보냈습니다 ✓`;
    sentMsg.classList.add('show');
    resetBtn.classList.remove('hidden');

    // 중복 전송 방지
    document.querySelectorAll('.call-btn').forEach(b => b.disabled = true);

    // 8초 후 자동 초기화 (다음 학생 대비)
    if (sentTimer) clearTimeout(sentTimer);
    sentTimer = setTimeout(() => resetToTeacherSelect(), 8000);
  });
});

// 선생님 선택 단계로 되돌리기 (연결·mainArea 유지)
function resetToTeacherSelect() {
  if (sentTimer) { clearTimeout(sentTimer); sentTimer = null; }
  selectedTeacher = null;
  sentMsg.classList.remove('show');
  resetBtn.classList.add('hidden');
  // STEP3 버튼 비활성화 + 비활성 상태 복원
  document.querySelectorAll('.call-btn').forEach(b => b.disabled = true);
  document.getElementById('cardCall').setAttribute('data-inactive', '');
  // 선생님 선택 해제
  document.querySelectorAll('.teacher-btn').forEach(b => b.classList.remove('selected'));
}

resetBtn.addEventListener('click', () => {
  if (sentTimer) clearTimeout(sentTimer);
  resetToTeacherSelect();
});

/* ═══════════════════════════════════════════
   URL 파라미터 자동 연결
═══════════════════════════════════════════ */
const autoCode = new URLSearchParams(location.search).get('code');
if (autoCode) {
  codeInput.value = autoCode;
  let waited = 0;
  const tryAuto = setInterval(() => {
    waited += 200;
    if (typeof Peer !== 'undefined') {
      clearInterval(tryAuto);
      startConnect(autoCode);
    } else if (waited >= 5000) {
      clearInterval(tryAuto);
      statusText.textContent = 'PeerJS 로드 실패 — 연결 버튼을 직접 눌러주세요.';
      connectBtn.disabled = false;
    }
  }, 200);
}

/* ═══════════════════════════════════════════
   키오스크 모드 — 전체화면 + 화면유지 + 보안
   bat 파일 없이 HTML 자체가 키오스크로 동작합니다.
═══════════════════════════════════════════ */

/* ── 1. 전체화면 (Fullscreen API) ──────────
   첫 터치/클릭 시 전체화면 진입.
   실수로 해제되면 0.5초 후 자동 재진입합니다. */
function enterFullscreen() {
  const el = document.documentElement;
  const req = el.requestFullscreen
    || el.webkitRequestFullscreen   // Safari/구형 Chrome
    || el.mozRequestFullScreen;     // Firefox
  if (req) req.call(el).catch(() => {});
}
// 첫 사용자 제스처에서 전체화면 진입 (브라우저 정책: 제스처 필요)
document.addEventListener('click',      enterFullscreen, { once: true });
document.addEventListener('touchstart', enterFullscreen, { once: true });

// 전체화면이 해제되면 자동 재진입 (Escape 키나 제스처로 해제 시 복구)
function onFullscreenChange() {
  const isFullscreen = !!(
    document.fullscreenElement || document.webkitFullscreenElement
  );
  if (!isFullscreen) setTimeout(enterFullscreen, 500);
}
document.addEventListener('fullscreenchange',       onFullscreenChange);
document.addEventListener('webkitfullscreenchange', onFullscreenChange);

/* ── 2. 화면 켜짐 유지 (Wake Lock API) ────
   태블릿 화면이 자동으로 꺼지지 않게 합니다.
   Chrome 84+ / Android Chrome 지원. */
async function requestWakeLock() {
  try {
    if (!('wakeLock' in navigator)) return;
    await navigator.wakeLock.request('screen');
    // 화면이 잠깐 꺼졌다 켜지면(잠금 해제) 재획득
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState === 'visible') {
        await navigator.wakeLock.request('screen').catch(() => {});
      }
    });
  } catch (e) { /* 미지원 기기는 조용히 무시 */ }
}
requestWakeLock();

/* ── 3. 우클릭 메뉴 방지 ─────────────────── */
document.addEventListener('contextmenu', e => e.preventDefault());

/* ── 4. 키보드 단축키 차단 ──────────────────
   새탭·새창·새로고침·주소창·개발자도구 등 차단 */
document.addEventListener('keydown', e => {
  const blocked =
    e.key === 'F5'  ||
    e.key === 'F11' ||
    e.key === 'F12' ||
    (e.ctrlKey && ['r','l','t','n','w','u'].includes(e.key.toLowerCase())) ||
    (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(e.key.toLowerCase()));
  if (blocked) e.preventDefault();
}, true);

/* ── 5. <a> 태그 이탈 방지 ─────────────────
   모든 링크를 현재 창에서 열기. 동적 생성 링크도 포함. */
function lockLinks() {
  document.querySelectorAll('a:not([data-kiosk-locked])').forEach(a => {
    a.setAttribute('target', '_self');
    a.setAttribute('rel', 'noopener noreferrer');
    a.setAttribute('data-kiosk-locked', '1');
  });
}
lockLinks();
new MutationObserver(lockLinks).observe(document.body, { childList: true, subtree: true });

/* ── 6. 뒤로가기 방지 ──────────────────────
   history 스택을 현재 위치로 고정합니다. */
history.pushState(null, '', location.href);
window.addEventListener('popstate', () => {
  history.pushState(null, '', location.href);
});
</script>
