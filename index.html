<!DOCTYPE html>
<!--
  [교무실 밖 태블릿용] index.html
  • GitHub Pages에 올려 학생 태블릿 브라우저 홈화면에 등록해두면 됩니다.
  • URL에 ?code=... 가 있으면 자동 연결, 없으면 QR/코드 입력 화면을 표시합니다.
  • 호출 전송 후 자동으로 초기화되어 다음 학생이 바로 사용할 수 있습니다.
-->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>교무실 호출</title>
<script>
(function(){
  function loadScript(url,ok,fail){var s=document.createElement('script');s.src=url;s.onload=ok;s.onerror=fail;document.head.appendChild(s);}
  loadScript('https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js',
    function(){console.log('[PeerJS] OK');},
    function(){
      loadScript('https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js',
        function(){console.log('[PeerJS] unpkg OK');},
        function(){
          document.body.innerHTML='<div style="padding:48px;text-align:center;font-family:sans-serif;color:#c0623f">'
            +'<h2>⚠️ PeerJS를 불러올 수 없습니다</h2><p>인터넷 연결 또는 CDN 차단 여부를 확인하세요.</p></div>';
        });
    });
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gowun+Batang:wght@700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f5f2eb;--card:#fff;--ink:#28251f;--muted:#9a9288;
    --line:#e4ddd0;--accent:#c0623f;--accent-soft:#fdf0eb;--ok:#4e7a55;--r:20px;
  }
  [data-dark]{
    --bg:#1b1916;--card:#252220;--ink:#ede8df;--muted:#8a847a;
    --line:#3a342c;--accent:#d98060;--accent-soft:#2e1e14;--ok:#80ae86;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;min-height:100dvh;background:var(--bg);color:var(--ink);
    font-family:'Gowun Dodum',sans-serif;
    display:flex;flex-direction:column;align-items:center;
    padding:24px 16px 56px;transition:background .3s,color .3s;}

  header{width:100%;max-width:500px;
    display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;}
  h1{font-family:'Gowun Batang',serif;font-size:1.4rem;margin:0;line-height:1.3;}
  h1 small{display:block;font-family:'Gowun Dodum',sans-serif;font-size:.76rem;
    color:var(--muted);font-weight:400;margin-top:2px;}
  .theme-btn{border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:999px;padding:7px 12px;cursor:pointer;font-family:inherit;font-size:.78rem;flex-shrink:0;}

  .card{width:100%;max-width:500px;background:var(--card);
    border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:12px;}
  .step-label{font-size:.78rem;color:var(--accent);font-weight:bold;
    margin-bottom:10px;letter-spacing:.03em;}

  /* 코드 입력 */
  .row{display:flex;gap:8px;}
  input[type=text]{flex:1;padding:12px 12px;border:1px solid var(--line);border-radius:11px;
    background:var(--bg);color:var(--ink);font-family:inherit;
    font-size:1.05rem;letter-spacing:.05em;}
  input[type=text]:focus{outline:2px solid var(--accent);}
  .btn-connect{padding:12px 16px;background:var(--accent);color:#fff;
    border:none;border-radius:11px;font-family:inherit;font-size:.95rem;
    cursor:pointer;font-weight:bold;white-space:nowrap;transition:.15s;}
  .btn-connect:active{transform:scale(.96);}
  .btn-connect:disabled{opacity:.4;cursor:not-allowed;}

  /* 상태 */
  .status{display:flex;align-items:center;gap:8px;font-size:.84rem;color:var(--muted);margin-top:11px;}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:.3s;}
  .dot.on{background:var(--ok);box-shadow:0 0 0 4px color-mix(in srgb,var(--ok) 22%,transparent);}

  /* 선생님 버튼 */
  .teacher-grid{display:flex;flex-wrap:wrap;gap:9px;}
  .teacher-btn{padding:12px 16px;border:1.5px solid var(--line);background:var(--card);
    border-radius:12px;cursor:pointer;font-family:inherit;font-size:.95rem;
    color:var(--ink);font-weight:bold;transition:.15s;}
  .teacher-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
  .teacher-btn.selected{border-color:var(--accent);background:var(--accent);color:#fff;}
  .teacher-btn:active{transform:scale(.96);}

  /* 호출 항목 */
  .call-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .call-btn{position:relative;overflow:hidden;height:100px;
    border:1.5px solid var(--line);background:var(--card);border-radius:15px;
    cursor:pointer;font-family:inherit;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
    transition:.15s;}
  .call-btn .icon{font-size:1.8rem;line-height:1;}
  .call-btn .lbl{font-size:.92rem;font-weight:bold;}
  .call-btn:not(:disabled):hover{border-color:var(--accent);background:var(--accent-soft);color:var(--accent);}
  .call-btn:not(:disabled):active{transform:scale(.96);}
  .call-btn:disabled{opacity:.3;cursor:not-allowed;}
  .ripple{position:absolute;border-radius:50%;background:var(--accent);
    opacity:.18;transform:scale(0);animation:rpl .5s linear;pointer-events:none;}
  @keyframes rpl{to{transform:scale(4);opacity:0;}}

  /* 전송 완료 + 초기화 카운트다운 */
  .sent-msg{margin-top:14px;padding:14px;text-align:center;
    background:color-mix(in srgb,var(--ok) 12%,transparent);
    border:1px solid color-mix(in srgb,var(--ok) 30%,transparent);
    border-radius:11px;color:var(--ok);font-weight:bold;font-size:.93rem;
    opacity:0;transition:.3s;}
  .sent-msg.show{opacity:1;}

  /* 초기화 버튼 */
  .btn-reset{width:100%;margin-top:10px;padding:11px;
    background:var(--bg);color:var(--muted);
    border:1px solid var(--line);border-radius:11px;
    font-family:inherit;font-size:.88rem;cursor:pointer;}
  .btn-reset:hover{border-color:var(--accent);color:var(--accent);}

  /* 토스트 */
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(10px);
    background:var(--ink);color:var(--bg);padding:10px 20px;border-radius:999px;
    font-size:.84rem;font-weight:bold;opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .hint{font-size:.79rem;color:var(--muted);line-height:1.75;margin:9px 0 0;}
  .hidden{display:none!important;}
</style>
</head>
<body>

<header>
  <h1>교무실 호출<small>시험 기간 교무실 선생님 호출</small></h1>
  <button class="theme-btn" id="themeBtn">🌙 다크</button>
</header>

<!-- STEP 1: 코드 입력 -->
<div class="card" id="cardConnect">
  <div class="step-label">STEP 1 — 호출 코드 입력</div>
  <div class="row">
    <input type="text" id="codeInput" placeholder="예: room-3a7f"
      autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button class="btn-connect" id="connectBtn">연결</button>
  </div>
  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">호출 코드를 입력하고 연결하세요.</span>
  </div>
  <p class="hint">
    호출 코드는 교무실 안 태블릿(수신 화면)에 크게 표시되어 있습니다.<br>
    QR 코드가 있다면 카메라 앱으로 스캔하면 자동 연결됩니다.
  </p>
</div>

<!-- STEP 2: 선생님 선택 -->
<div class="card hidden" id="cardTeacher">
  <div class="step-label">STEP 2 — 선생님 선택</div>
  <div class="teacher-grid" id="teacherGrid"></div>
</div>

<!-- STEP 3: 호출 항목 선택 -->
<div class="card hidden" id="cardCall">
  <div class="step-label">STEP 3 — 호출 항목 선택</div>
  <div class="call-grid">
    <button class="call-btn" data-item="상담"    disabled><span class="icon">💬</span><span class="lbl">상담</span></button>
    <button class="call-btn" data-item="서류 제출" disabled><span class="icon">📄</span><span class="lbl">서류 제출</span></button>
    <button class="call-btn" data-item="출석 확인" disabled><span class="icon">✅</span><span class="lbl">출석 확인</span></button>
    <button class="call-btn" data-item="질문"    disabled><span class="icon">❓</span><span class="lbl">질문</span></button>
    <button class="call-btn" data-item="서명"    disabled><span class="icon">✍️</span><span class="lbl">서명</span></button>
    <button class="call-btn" data-item="기타"    disabled><span class="icon">📢</span><span class="lbl">기타</span></button>
  </div>
  <div class="sent-msg" id="sentMsg"></div>
  <!-- 호출 후 다음 학생이 쓸 수 있도록 초기화 버튼 -->
  <button class="btn-reset hidden" id="resetBtn">↩ 처음으로 돌아가기 (다음 학생)</button>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   다크모드
═══════════════════════════════════════════ */
document.getElementById('themeBtn').addEventListener('click', () => {
  document.body.toggleAttribute('data-dark');
  document.getElementById('themeBtn').textContent =
    document.body.hasAttribute('data-dark') ? '☀️ 라이트' : '🌙 다크';
});

/* ═══════════════════════════════════════════
   토스트
═══════════════════════════════════════════ */
const toastEl = document.getElementById('toast');
function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(() => toastEl.classList.remove('show'), 2400);
}

/* ═══════════════════════════════════════════
   상태 변수
═══════════════════════════════════════════ */
let conn            = null;   // 교무실과의 PeerJS 연결
let selectedTeacher = null;   // 선택된 선생님 이름
let sentTimer       = null;   // 자동 초기화 타이머

const dot        = document.getElementById('dot');
const statusText = document.getElementById('statusText');
const connectBtn = document.getElementById('connectBtn');
const codeInput  = document.getElementById('codeInput');

/* ═══════════════════════════════════════════
   PeerJS 연결
═══════════════════════════════════════════ */
function startConnect(code) {
  if (typeof Peer === 'undefined') {
    statusText.textContent = 'PeerJS 로딩 중... 잠시 후 다시 눌러주세요.';
    connectBtn.disabled = false;
    return;
  }
  connectBtn.disabled = true;
  statusText.textContent = '연결 중...';

  const myPeer = new Peer();
  myPeer.on('open', () => {
    conn = myPeer.connect(code, { reliable: true });

    conn.on('open', () => {
      dot.classList.add('on');
      statusText.textContent = '교무실 연결됨 ✓ 선생님을 선택하세요.';
    });

    // 교무실에서 선생님 목록 수신
    conn.on('data', (raw) => {
      try {
        const msg = JSON.parse(raw);
        if (msg.type === 'init') buildTeacherButtons(msg.teachers);
      } catch(e) {}
    });

    conn.on('error', () => {
      statusText.textContent = '연결 오류 — 코드를 확인하세요.';
      connectBtn.disabled = false;
    });

    conn.on('close', () => {
      dot.classList.remove('on');
      showToast('연결이 끊겼습니다. 페이지를 새로고침하세요.');
      document.querySelectorAll('.call-btn').forEach(b => b.disabled = true);
    });
  });

  myPeer.on('error', () => {
    statusText.textContent = '오류 — 코드가 맞는지, 교무실 화면이 켜져 있는지 확인하세요.';
    connectBtn.disabled = false;
  });
}

connectBtn.addEventListener('click', () => {
  const code = codeInput.value.trim();
  if (!code) { showToast('호출 코드를 먼저 입력하세요'); return; }
  startConnect(code);
});
codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') connectBtn.click(); });

/* ═══════════════════════════════════════════
   선생님 목록 버튼 생성
═══════════════════════════════════════════ */
function buildTeacherButtons(teachers) {
  const grid = document.getElementById('teacherGrid');
  grid.innerHTML = '';
  teachers.forEach(name => {
    const btn = document.createElement('button');
    btn.className = 'teacher-btn';
    btn.textContent = name + ' 선생님';
    btn.addEventListener('click', () => {
      document.querySelectorAll('.teacher-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTeacher = name;
      document.getElementById('cardCall').classList.remove('hidden');
      document.querySelectorAll('.call-btn').forEach(b => b.disabled = false);
      // 호출 항목 카드로 부드럽게 스크롤
      document.getElementById('cardCall').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
    grid.appendChild(btn);
  });
  document.getElementById('cardTeacher').classList.remove('hidden');
}

/* ═══════════════════════════════════════════
   호출 전송 + 자동 초기화
═══════════════════════════════════════════ */
const sentMsg  = document.getElementById('sentMsg');
const resetBtn = document.getElementById('resetBtn');

document.querySelectorAll('.call-btn').forEach(btn => {
  btn.addEventListener('click', function(e) {
    if (!selectedTeacher) { showToast('선생님을 먼저 선택해 주세요.'); return; }
    if (!conn || !conn.open) { showToast('연결이 끊겼습니다. 새로고침 후 다시 연결하세요.'); return; }

    // 잔물결 효과
    const r = document.createElement('span');
    r.className = 'ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    this.appendChild(r);
    setTimeout(() => r.remove(), 600);

    // 교무실로 전송
    conn.send(JSON.stringify({ type: 'call', teacher: selectedTeacher, item: btn.dataset.item }));

    // 완료 메시지 표시
    sentMsg.textContent = `${selectedTeacher} 선생님께 '${btn.dataset.item}' 호출을 보냈습니다 ✓`;
    sentMsg.classList.add('show');
    resetBtn.classList.remove('hidden');

    // 모든 호출 버튼 비활성화 (중복 전송 방지)
    document.querySelectorAll('.call-btn').forEach(b => b.disabled = true);

    // 8초 후 자동으로 선생님 선택 초기화 (다음 학생 대비)
    // 연결은 유지되므로 코드 재입력 불필요
    if (sentTimer) clearTimeout(sentTimer);
    sentTimer = setTimeout(() => resetToTeacherSelect(), 8000);
  });
});

// 초기화: 선생님 선택 단계로 되돌리기 (연결은 유지)
function resetToTeacherSelect() {
  if (sentTimer) { clearTimeout(sentTimer); sentTimer = null; }
  selectedTeacher = null;
  sentMsg.classList.remove('show');
  resetBtn.classList.add('hidden');
  document.getElementById('cardCall').classList.add('hidden');
  document.querySelectorAll('.teacher-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.call-btn').forEach(b => b.disabled = false);
  // 선생님 선택 카드로 스크롤
  document.getElementById('cardTeacher').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

resetBtn.addEventListener('click', () => {
  if (sentTimer) clearTimeout(sentTimer);
  resetToTeacherSelect();
});

/* ═══════════════════════════════════════════
   URL 파라미터 자동 연결
   (receive.html 이 만드는 링크: index.html?code=room-xxxx)
═══════════════════════════════════════════ */
const autoCode = new URLSearchParams(location.search).get('code');
if (autoCode) {
  codeInput.value = autoCode;
  // PeerJS 비동기 로드 대기 후 자동 연결
  let waited = 0;
  const tryAuto = setInterval(() => {
    waited += 200;
    if (typeof Peer !== 'undefined') {
      clearInterval(tryAuto);
      startConnect(autoCode);
    } else if (waited >= 5000) {
      clearInterval(tryAuto);
      statusText.textContent = 'PeerJS 로드 실패 — 연결 버튼을 직접 눌러주세요.';
      connectBtn.disabled = false;
    }
  }, 200);
}
</script>
</body>
</html>
